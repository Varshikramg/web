<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Checkout</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fb; padding: 30px; }
    .box { max-width: 640px; margin: auto; background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 10px 24px rgba(0,0,0,.08); }
    .row { margin-bottom: 16px; }
    label { display: block; margin: 8px 0; }
    input[type="text"] { width: 100%; padding: 10px; }
    .hidden { display: none; }
    .error { color: #b00020; }
    .success { color: #0a7a28; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Product Checkout</h1>
    <form id="checkoutForm">
      <div class="row">
        <strong>Select Products</strong>
        <label><input type="checkbox" value="1200"> Keyboard - Rs.1200</label>
        <label><input type="checkbox" value="2200"> Mouse - Rs.2200</label>
        <label><input type="checkbox" value="3500"> Headset - Rs.3500</label>
        <label><input type="checkbox" value="4800"> Webcam - Rs.4800</label>
      </div>

      <div class="row">
        <strong>Payment Method</strong>
        <label><input type="radio" name="payment" value="card" checked> Credit Card</label>
        <label><input type="radio" name="payment" value="upi"> UPI</label>
      </div>

      <div id="cardFields" class="row">
        <label>Card Number
          <input type="text" id="cardNumber" maxlength="16" placeholder="16 digit card number">
        </label>
        <label>Expiry Date
          <input type="text" id="expiryDate" placeholder="MM/YY">
        </label>
      </div>

      <div class="row"><strong>Total: Rs.<span id="total">0</span></strong></div>
      <button type="submit">Submit</button>
      <p id="message"></p>
    </form>
  </div>

  <script>
    const form = document.getElementById("checkoutForm");
    const totalEl = document.getElementById("total");
    const messageEl = document.getElementById("message");

    function updateTotal() {
      const total = [...document.querySelectorAll('input[type="checkbox"]:checked')]
        .reduce((sum, item) => sum + Number(item.value), 0);
      totalEl.textContent = total;
    }

    function validate() {
      const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
      if (!checked) return "Select at least one product.";
      const payment = document.querySelector('input[name="payment"]:checked').value;
      if (payment === "card") {
        const card = document.getElementById("cardNumber").value.trim();
        const expiry = document.getElementById("expiryDate").value.trim();
        if (!/^\d{16}$/.test(card)) return "Enter a valid 16 digit card number.";
        if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)) return "Enter expiry date in MM/YY format.";
      }
      return "";
    }

    document.querySelectorAll('input[type="checkbox"]').forEach((box) => box.addEventListener("change", updateTotal));
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      messageEl.className = "";
      const error = validate();
      if (error) {
        messageEl.textContent = error;
        messageEl.className = "error";
        return;
      }
      messageEl.textContent = "Submitting...";
      setTimeout(() => {
        messageEl.textContent = "Form submitted successfully using simulated AJAX.";
        messageEl.className = "success";
      }, 900);
    });
  </script>
</body>
</html>
