<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlapping Images</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f8f1e7, #d8e2dc);
    }
    .gallery {
      position: relative;
      width: 760px;
      height: 420px;
    }
    .card {
      position: absolute;
      width: 240px;
      height: 320px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.25);
      transition: transform 0.35s ease, z-index 0.35s ease, box-shadow 0.35s ease;
      cursor: pointer;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card:nth-child(1) { left: 40px; top: 70px; transform: rotate(-8deg); }
    .card:nth-child(2) { left: 220px; top: 40px; transform: rotate(4deg); }
    .card:nth-child(3) { left: 400px; top: 90px; transform: rotate(-6deg); }
    .card.active {
      transform: scale(1.15) rotate(0deg);
      z-index: 10;
      box-shadow: 0 26px 45px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>
  <div class="gallery">
    <div class="card"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=700&q=80" alt="Mountain"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=700&q=80" alt="Forest"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=700&q=80" alt="Beach"></div>
  </div>

  <script>
    document.querySelectorAll(".card").forEach((card) => {
      card.addEventListener("mouseenter", () => {
        document.querySelectorAll(".card").forEach((item) => item.classList.remove("active"));
        card.classList.add("active");
      });
      card.addEventListener("mouseleave", () => card.classList.remove("active"));
    });
  </script>
</body>
</html>
